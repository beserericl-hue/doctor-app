appId: com.agileadautomation.medibook
---
- launchApp
- tapOn:
    id: "tab-doctors"
- assertVisible:
    text: "Find a Doctor"
- waitForAnimationToEnd
- tapOn:
    text: "Book Now"
    index: 0
- tapOn:
    text: "Availability"
- tapOn:
    text: "09:00 AM"
- tapOn:
    text: "Book Appointment"
- assertVisible:
    text: "Confirm Booking"
- tapOn:
    text: "Confirm Booking"
- assertVisible:
    text: "Appointment Confirmed!"
- takeScreenshot: booking-confirmed
